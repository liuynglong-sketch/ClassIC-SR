name: train_classic_sr_x4
use_tb_logger: true
model: ClassSR
distortion: sr
scale: 4
gpu_ids: [0]
patch_size: 32
step: 28
fix_SR_module: false

datasets:
  train:
    name: DIV2K_sub_patches
    mode: LQGT
    dataroot_GT: ./datasets/DIV2K_scale_sub/GT
    dataroot_LQ: ./datasets/DIV2K_scale_sub/LR
    use_shuffle: true
    n_workers: 6
    batch_size: 96
    GT_size: 128
    use_flip: true
    use_rot: true
    color: RGB
  val:
    name: DIV2K_valid_small
    mode: LQGT
    dataroot_GT: ./datasets/val_10/HR
    dataroot_LQ: ./datasets/val_10/LR

network_G:
  which_model_G: classSR_3class_fsrcnn_medium_2x3x3c24_2x3x3_originhard_net
  in_nc: 3
  out_nc: 3

path:
  pretrain_model_G: ~
  pretrain_model_classifier: ./pretrained/pretrain_model_classifier.pth
  pretrain_model_G_branch1: ./pretrained/classic_sr_easy_branch.pth
  pretrain_model_G_branch2: ./pretrained/classic_sr_medium_branch.pth
  pretrain_model_G_branch3: ./pretrained/fsrcnn_hard_branch.pth
  resume_state: ~
  strict_load: false

train:
  lr_G: !!float 2e-4
  lr_scheme: CosineAnnealingLR_Restart
  beta1: 0.9
  beta2: 0.99
  niter: 200000
  warmup_iter: -1
  T_period: [500000, 500000]
  restarts: [500000]
  restart_weights: [1]
  eta_min: !!float 1e-7
  pixel_criterion: ClassSR_loss
  l1w: 1000
  class_loss_w: 0.5
  average_loss_w: 3
  manual_seed: 10
  val_freq: !!float 1000

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2000
